<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程觀看 — 強腦力 SkyBraining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#151731;--paper:#FAF9F5;--paper-2:#F2F0E8;--ink:#1B1D33;--ink-soft:#5b5f7a;
    --amber:#FFB020;--orange:#FF8A3D;--teal:#16B0A8;--teal-deep:#0d8a83;
    --line-brand:#06C755;--line-deep:#05A648;--hair:rgba(21,23,49,.1);
    --sans:"Noto Sans TC",sans-serif;--round:"Baloo 2","Noto Sans TC",sans-serif;
    --shadow-sm:0 6px 20px rgba(21,23,49,.06);--shadow-md:0 18px 44px rgba(21,23,49,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;min-height:100vh;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3,.round{font-family:var(--round);}
  .wrap{max-width:960px;margin:0 auto;padding:0 clamp(20px,5vw,40px);}
  nav{background:rgba(250,249,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:20;}
  .nav-in{display:flex;align-items:center;justify-content:space-between;padding:13px clamp(20px,5vw,40px);max-width:1060px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--round);font-weight:800;font-size:20px;color:var(--indigo);}
  .logo-mark{width:36px;height:36px;border-radius:10px;background:var(--indigo);display:grid;place-items:center;box-shadow:var(--shadow-sm);}
  .logo-mark svg{width:22px;height:22px;}
  .nav-right{display:flex;align-items:center;gap:14px;font-size:14px;}
  .nav-right a{color:var(--ink-soft);font-weight:500;}
  .nav-right a:hover{color:var(--indigo);}
  .crumb{padding:26px 0 4px;font-size:13.5px;color:var(--ink-soft);}
  .crumb a:hover{color:var(--teal-deep);}
  .state{padding:90px 0;text-align:center;color:var(--ink-soft);}
  .state .spin{width:34px;height:34px;border:3px solid var(--hair);border-top-color:var(--orange);border-radius:50%;margin:0 auto 16px;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .player-head{padding:8px 0 22px;}
  .lv{display:inline-block;font-family:var(--round);font-weight:700;font-size:12.5px;color:#fff;padding:5px 13px;border-radius:20px;margin-bottom:12px;}
  .lv.amber{background:linear-gradient(135deg,#FFB020,#FF8A3D);}
  .lv.teal{background:linear-gradient(135deg,#16B0A8,#0d8a83);}
  h1{font-weight:800;font-size:clamp(24px,3.6vw,34px);color:var(--indigo);}
  .h-sub{color:var(--ink-soft);margin-top:6px;font-size:15px;}
  .video-frame{position:relative;width:100%;aspect-ratio:16/9;background:#0d0f22;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-md);}
  .video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .video-ph{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:rgba(255,255,255,.8);padding:24px;}
  .video-ph .ic{font-size:40px;margin-bottom:12px;}
  .video-ph .big{font-family:var(--round);font-weight:700;font-size:20px;color:#fff;margin-bottom:8px;}
  .video-ph .small{font-size:13.5px;color:rgba(255,255,255,.6);max-width:44ch;}
  .owned-note{margin-top:18px;padding:14px 18px;background:rgba(22,176,168,.1);border:1px solid rgba(22,176,168,.25);border-radius:14px;color:var(--teal-deep);font-size:14px;display:flex;align-items:center;gap:9px;}
  /* locked */
  .lock{max-width:560px;margin:30px auto 70px;background:#fff;border:1px solid var(--hair);border-radius:24px;box-shadow:var(--shadow-md);padding:44px 36px;text-align:center;}
  .lock .lk-ic{width:70px;height:70px;border-radius:20px;background:var(--paper-2);display:grid;place-items:center;font-size:32px;margin:0 auto 20px;}
  .lock h2{font-family:var(--round);font-weight:800;font-size:24px;color:var(--indigo);margin-bottom:10px;}
  .lock p{color:var(--ink-soft);font-size:15px;margin-bottom:26px;}
  .lock .price{font-family:var(--round);font-weight:800;font-size:30px;color:var(--indigo);margin-bottom:22px;}
  .lock .price small{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:var(--round);font-weight:700;font-size:15px;padding:13px 26px;border-radius:40px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;transition:transform .2s,box-shadow .2s;}
  .btn:hover{transform:translateY(-2px);}
  .btn-buy{color:#fff;}
  .btn-buy.amber{background:linear-gradient(135deg,#FFB020,#FF8A3D);box-shadow:0 12px 28px rgba(255,138,61,.32);}
  .btn-buy.teal{background:linear-gradient(135deg,#16B0A8,#0d8a83);box-shadow:0 12px 28px rgba(22,176,168,.32);}
  .btn-ghost{background:var(--paper-2);color:var(--indigo);}
  .btn-line{background:var(--line-brand);color:#fff;}
  .back-dash{display:inline-block;margin-top:8px;padding-bottom:60px;font-size:14px;color:var(--ink-soft);}
</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <a class="brand" href="index.html">
      <span class="logo-mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.2c-2.6 0-4.6 1.7-5 4C5 6.6 3.6 8.2 3.6 10.2c0 1.2.5 2.2 1.3 2.9-.2.5-.3 1-.3 1.6 0 2.1 1.7 3.7 3.9 3.7.5 1.3 1.8 2.2 3.5 2.2s3-.9 3.5-2.2c2.2 0 3.9-1.6 3.9-3.7 0-.6-.1-1.1-.3-1.6.8-.7 1.3-1.7 1.3-2.9 0-2-1.4-3.6-3.4-4-.4-2.3-2.4-4-5-4z" fill="#FFB020"/></svg></span>
      強腦力
    </a>
    <div class="nav-right">
      <a href="member.html">我的課程</a>
      <a href="#" id="logout">登出</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="crumb"><a href="member.html">我的課程</a> ／ <span id="crumbName">課程觀看</span></div>
  <div id="content">
    <div class="state"><div class="spin"></div>確認觀看權限中…</div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const SUPABASE_URL  = 'https://gfuqizxzihgydzyqywun.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_4OkL-CDoS542x8odCTWbtQ_DzKR7dMv';
  const LOGIN_PAGE = 'login.html';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
  const $ = (id)=>document.getElementById(id);

  $('logout').onclick = async (e)=>{ e.preventDefault(); await supabase.auth.signOut(); location.href = LOGIN_PAGE; };

  const courseId = new URLSearchParams(location.search).get('course');

  (async ()=>{
    if(!courseId){ $('content').innerHTML = msg('缺少課程參數','請從「我的課程」點選要觀看的課程。'); return; }

    // 必須登入
    const { data:{ session } } = await supabase.auth.getSession();
    if(!session){ location.href = LOGIN_PAGE + '?next=' + encodeURIComponent(location.href); return; }

    // 讀課程資料
    const { data:course, error:cErr } = await supabase.from('courses').select('*').eq('id',courseId).maybeSingle();
    if(cErr || !course){ $('content').innerHTML = msg('找不到這門課程', cErr?cErr.message:'請確認課程是否存在。'); return; }
    $('crumbName').textContent = course.name;

    // === 購買比對：查本人是否已開通此課（RLS 只會回本人資料）===
    const { data:enroll } = await supabase.from('enrollments').select('id').eq('course_id',courseId).maybeSingle();
    const owned = !!enroll;

    const color = course.accent==='teal' ? 'teal' : 'amber';

    if(owned){
      // 已購買 → 顯示付費版 Vimeo 嵌入
      const vimeo = (course.vimeo_id||'').trim();
      const playerHtml = vimeo
        ? `<iframe src="https://player.vimeo.com/video/${encodeURIComponent(vimeo)}?title=0&byline=0&portrait=0"
             allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`
        : `<div class="video-ph">
             <div>
               <div class="ic">🎬</div>
               <div class="big">影片即將上線</div>
               <div class="small">此課程尚未設定 Vimeo 影片。請於 courses 資料表把這門課的 <b>vimeo_id</b> 填入付費版影片 ID，播放器就會自動載入。</div>
             </div>
           </div>`;
      $('content').innerHTML = `
        <div class="player-head">
          <span class="lv ${color}">Level ${course.level}・${course.subtitle||''}</span>
          <h1>${course.name}</h1>
          <div class="h-sub">${course.description||''}</div>
        </div>
        <div class="video-frame">${playerHtml}</div>
        <div class="owned-note">✅ 你已購買本課程，買斷永久觀看，隨時都能回來複習。</div>
        <a class="back-dash" href="member.html">← 回我的課程</a>`;
    }else if((course.price||0)===0){
      // 免費課・尚未開通 → NT$0 自助開通
      $('content').innerHTML = `
        <div class="lock">
          <div class="lk-ic">🎁</div>
          <h2>免費課程・登入就能看</h2>
          <p>「${course.name}」是免費體驗課。按下方按鈕以 NT$0 開通，開通後就會出現在你的「我的課程」，隨時都能回來看。</p>
          <div class="price">NT$0<small> ・免費・永久觀看</small></div>
          <div class="btns">
            <button class="btn btn-buy teal" id="freeUnlock">✓ NT$0 免費開通・立即觀看</button>
          </div>
          <div id="freeErr" style="color:#d64545;font-size:13.5px;margin-top:14px;display:none;"></div>
          <div style="margin-top:22px;"><a class="btn btn-ghost" href="member.html">← 回我的課程</a></div>
        </div>`;
      $('freeUnlock').onclick = async ()=>{
        const btn=$('freeUnlock'); btn.disabled=true; btn.textContent='開通中…';
        const { error } = await supabase.from('enrollments')
          .insert({ user_id: session.user.id, course_id: courseId, source: 'free' });
        if(error && !/duplicate|unique|conflict/i.test(error.message)){
          btn.disabled=false; btn.textContent='再試一次';
          const e=$('freeErr'); e.style.display='block'; e.textContent='開通失敗：'+error.message; return;
        }
        location.reload();
      };
    }else{
      // 付費課・未購買 → 鎖定 + 購買 CTA
      const introHref = courseId==='super-memory' ? 'course-memory.html'
                      : courseId==='super-thinking' ? 'course-thinking.html'
                      : 'index.html#courses';
      $('content').innerHTML = `
        <div class="lock">
          <div class="lk-ic">🔒</div>
          <h2>這門課還沒開通</h2>
          <p>「${course.name}」目前不在你的已購買清單中。完成購買後即可永久觀看。</p>
          <div class="price">NT$${(course.price||0).toLocaleString()}<small> ・買斷永久觀看</small></div>
          <div class="btns">
            <a class="btn btn-buy ${color}" href="${introHref}">前往購買 →</a>
            <a class="btn btn-line" href="https://lin.ee/9EGO8IT" target="_blank" rel="noopener">先免費試看</a>
          </div>
          <div style="margin-top:22px;"><a class="btn btn-ghost" href="member.html">← 回我的課程</a></div>
        </div>`;
    }
  })();

  function msg(title, desc){
    return `<div class="lock"><div class="lk-ic">⚠️</div><h2>${title}</h2><p>${desc}</p>
      <div class="btns"><a class="btn btn-ghost" href="member.html">← 回我的課程</a></div></div>`;
  }
</script>
</body>
</html>
