<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>後台管理・會員與銷售 — 強腦力 SkyBraining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#151731;--paper:#FAF9F5;--paper-2:#F2F0E8;--ink:#1B1D33;--ink-soft:#5b5f7a;
    --amber:#FFB020;--orange:#FF8A3D;--teal:#16B0A8;--teal-deep:#0d8a83;--violet:#7C6CF0;--err:#d64545;
    --hair:rgba(21,23,49,.1);--sans:"Noto Sans TC",sans-serif;--round:"Baloo 2","Noto Sans TC",sans-serif;
    --accent:linear-gradient(120deg,var(--amber),var(--orange));--shadow-md:0 18px 44px rgba(21,23,49,.12);--shadow-sm:0 6px 20px rgba(21,23,49,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:var(--teal-deep);text-decoration:none;}
  h1,h2,h3,.round{font-family:var(--round);}
  nav{background:var(--indigo);color:#fff;}
  .nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(20px,5vw,40px);max-width:1080px;margin:0 auto;}
  .brand{font-family:var(--round);font-weight:800;font-size:19px;color:#fff;display:flex;align-items:center;gap:9px;}
  .brand .b{width:9px;height:9px;border-radius:50%;background:var(--amber);}
  .nav-in a{color:rgba(255,255,255,.85);font-size:14px;}
  .tabs{background:#fff;border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:20;}
  .tabs-in{max-width:1080px;margin:0 auto;display:flex;gap:4px;padding:0 clamp(12px,4vw,24px);overflow-x:auto;}
  .tabs a{font-family:var(--round);font-weight:700;font-size:14.5px;color:var(--ink-soft);padding:14px 16px;border-bottom:3px solid transparent;white-space:nowrap;}
  .tabs a.active{color:var(--indigo);border-bottom-color:var(--orange);}
  .tabs a:hover{color:var(--indigo);}
  .wrap{max-width:1080px;margin:0 auto;padding:clamp(20px,5vw,38px) 18px 90px;}
  .h{margin-bottom:4px;font-family:var(--round);font-weight:800;font-size:clamp(23px,4vw,31px);color:var(--indigo);}
  .sub{color:var(--ink-soft);margin-bottom:24px;font-size:15px;}
  .card{background:#fff;border:1px solid var(--hair);border-radius:20px;box-shadow:var(--shadow-sm);padding:24px 24px;margin-bottom:22px;}
  .card h2{font-size:18px;color:var(--indigo);margin-bottom:4px;display:flex;align-items:center;gap:9px;}
  .card h2 .bar{width:5px;height:20px;border-radius:3px;background:linear-gradient(var(--amber),var(--orange));}
  .card-note{color:var(--ink-soft);font-size:13.5px;margin:2px 0 14px 14px;}
  /* stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  @media(max-width:760px){.tiles{grid-template-columns:repeat(2,1fr);}}
  .tile{background:#fff;border:1px solid var(--hair);border-radius:18px;box-shadow:var(--shadow-sm);padding:18px 18px;}
  .tile .k{font-size:13px;color:var(--ink-soft);font-weight:500;margin-bottom:6px;}
  .tile .v{font-family:var(--round);font-weight:800;font-size:26px;color:var(--indigo);line-height:1.1;}
  .tile .x{font-size:12px;color:var(--ink-soft);margin-top:5px;}
  .tile.money{background:linear-gradient(135deg,#151731,#22264f);border:none;}
  .tile.money .k{color:rgba(255,255,255,.7);}
  .tile.money .v{color:#fff;}
  .tile.money .v small{font-size:15px;font-weight:700;color:var(--amber);}
  .tile.money .x{color:rgba(255,255,255,.6);}
  .row-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .tools{display:flex;gap:8px;flex-wrap:wrap;}
  input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--hair);border-radius:11px;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);}
  textarea{min-height:150px;resize:vertical;line-height:1.7;}
  .btn-post{color:#fff;background:linear-gradient(135deg,#7C6CF0,#4B37D8);box-shadow:0 10px 24px rgba(124,108,240,.3);}
  .post-st{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:14px;white-space:nowrap;}
  .post-st.published{background:rgba(22,176,168,.14);color:#0d8a83;}
  .post-st.draft{background:var(--paper-2);color:var(--ink-soft);}
  .mini{font-family:var(--round);font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:18px;cursor:pointer;border:none;white-space:nowrap;margin:1px;}
  .mini.pub{color:#fff;background:linear-gradient(135deg,#16B0A8,#0d8a83);}
  .mini.draft{color:var(--indigo);background:var(--paper-2);}
  .mini.del{color:var(--err);background:rgba(214,69,69,.08);border:1px solid rgba(214,69,69,.22);}
  label{display:block;font-weight:700;font-size:13.5px;color:var(--indigo);margin:12px 0 6px;font-family:var(--round);}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
  .btn{font-family:var(--round);font-weight:700;font-size:15px;padding:12px 22px;border-radius:30px;border:none;cursor:pointer;transition:transform .2s,filter .2s;}
  .btn:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
  .btn-grant{color:#fff;background:linear-gradient(135deg,#16B0A8,#0d8a83);box-shadow:0 10px 24px rgba(22,176,168,.3);}
  .btn-list{color:var(--indigo);background:var(--paper-2);}
  .btn-revoke{color:var(--err);background:rgba(214,69,69,.08);border:1px solid rgba(214,69,69,.25);}
  .btn-ghost{color:var(--indigo);background:var(--paper-2);font-size:13.5px;padding:9px 16px;}
  .btn-csv{color:#fff;background:linear-gradient(135deg,#16B0A8,#0d8a83);font-size:13.5px;padding:9px 16px;}
  .msg{margin-top:16px;padding:12px 15px;border-radius:12px;font-size:14px;display:none;white-space:pre-wrap;}
  .msg.show{display:block;}
  .msg.ok{background:rgba(22,176,168,.12);color:var(--teal-deep);border:1px solid rgba(22,176,168,.28);}
  .msg.error{background:rgba(214,69,69,.1);color:var(--err);border:1px solid rgba(214,69,69,.25);}
  .tbl-scroll{overflow-x:auto;margin-top:4px;max-height:460px;overflow-y:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px;}
  thead th{position:sticky;top:0;background:#fff;z-index:1;}
  th,td{border-bottom:1px solid var(--hair);padding:10px 10px;text-align:left;vertical-align:middle;}
  th{color:var(--ink-soft);font-weight:700;font-size:12.5px;white-space:nowrap;}
  tbody tr:hover{background:var(--paper);}
  .seq{color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .email-cell{font-weight:500;color:var(--indigo);word-break:break-all;}
  .money-cell{font-family:var(--round);font-weight:800;color:var(--indigo);white-space:nowrap;}
  .money-cell.free{color:#c9ccd8;}
  .prov,.src{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:14px;background:var(--paper-2);color:var(--ink-soft);margin:1px;white-space:nowrap;}
  .prov.google{background:rgba(66,133,244,.12);color:#2a63c8;}
  .prov.email{background:rgba(255,138,61,.14);color:#c85f1a;}
  .prov.line,.src.card{background:rgba(6,199,85,.14);color:#05a648;}
  .src.free{background:var(--paper-2);color:var(--ink-soft);}
  .src.manual{background:rgba(255,176,32,.16);color:#b7791a;}
  .cc{font-family:var(--round);font-weight:800;color:var(--indigo);}
  .cc.zero{color:#c9ccd8;}
  .pick{font-family:var(--round);font-weight:700;font-size:13px;color:#fff;background:linear-gradient(135deg,#16B0A8,#0d8a83);border:none;padding:7px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;}
  .pick:hover{filter:brightness(1.05);}
  .gate{max-width:460px;margin:80px auto;text-align:center;color:var(--ink-soft);}
  .gate h2{font-family:var(--round);font-weight:800;color:var(--indigo);font-size:22px;margin-bottom:10px;}
  .note{font-size:12.5px;color:var(--ink-soft);margin-top:8px;}
  .state{padding:44px 0;text-align:center;color:var(--ink-soft);}
  .spin{width:32px;height:32px;border:3px solid var(--hair);border-top-color:var(--orange);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .selbar{background:var(--paper-2);border-radius:12px;padding:9px 14px;font-size:13.5px;color:var(--ink-soft);margin-bottom:6px;display:none;}
  .selbar.show{display:block;}
  .selbar b{color:var(--indigo);}
  .empty{padding:26px 0;text-align:center;color:var(--ink-soft);font-size:14px;}
</style>
</head>
<body>
<nav><div class="nav-in"><span class="brand"><span class="b"></span>強腦力 後台</span><a href="member.html">← 會員中心</a></div></nav>
<div class="tabs"><div class="tabs-in">
  <a href="admin.html" class="active">總覽・銷售</a>
  <a href="admin-contacts.html">名單管理</a>
  <a href="admin-broadcast.html">群發信</a>
</div></div>
<div id="content"><div class="state"><div class="spin"></div>確認管理員權限中…</div></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const SUPABASE_URL='https://gfuqizxzihgydzyqywun.supabase.co';
  const SUPABASE_ANON='sb_publishable_4OkL-CDoS542x8odCTWbtQ_DzKR7dMv';
  const ADMIN_EMAILS=['brainingflow@gmail.com'];
  const supabase=createClient(SUPABASE_URL,SUPABASE_ANON);
  const $=(id)=>document.getElementById(id);
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtDate=(s)=> s ? String(s).slice(0,16).replace('T',' ') : '';
  const nt=(n)=> 'NT$'+Number(n||0).toLocaleString();

  (async ()=>{
    const { data:{ session } } = await supabase.auth.getSession();
    if(!session){ location.href='login.html?next='+encodeURIComponent(location.href); return; }
    const email=(session.user.email||'').toLowerCase();
    if(!ADMIN_EMAILS.includes(email)){
      $('content').innerHTML=`<div class="gate"><h2>非管理員帳號</h2><p>這個頁面僅限管理員（${esc(ADMIN_EMAILS.join('、'))}）使用。<br>你目前登入的是 ${esc(session.user.email)}。</p><p class="note"><a href="member.html">← 回會員中心</a></p></div>`;
      return;
    }
    const { data:courses } = await supabase.from('courses').select('id,name,price').order('sort_order');
    const opts=(courses||[]).map(c=>`<option value="${esc(c.id)}">${esc(c.name)}（${c.price?('NT$'+c.price):'免費'}・${esc(c.id)}）</option>`).join('');

    $('content').innerHTML=`
      <div class="wrap">
        <div class="h">會員與銷售後台</div>
        <div class="sub">課程開通、銷售金額、購買紀錄一次看。金流串接完成前，現金／臨櫃付費也能在這裡手動開通。</div>

        <div class="tiles" id="tiles"></div>

        <div class="card">
          <h2><span class="bar"></span>發一篇文（最新消息・每日腦力）</h2>
          <div class="card-note">在這裡發文，會即時出現在網站的「最新消息」頁（blog.html），<b>不用部署、不用改程式</b>。適合每天發腦力小知識、近況、活動。</div>
          <label>標題</label>
          <input id="pTitle" type="text" placeholder="例如：今天的記憶小技巧：把數字變成畫面">
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <div style="flex:1;min-width:180px;"><label>標籤（可空）</label><input id="pTag" type="text" placeholder="記憶 / 專注 / 近況…"></div>
            <div style="flex:2;min-width:220px;"><label>封面圖網址（可空）</label><input id="pCover" type="text" placeholder="https://…（貼圖片連結，沒有就留白）"></div>
          </div>
          <label>內容</label>
          <textarea id="pBody" placeholder="直接打字，換行會保留。可以寫一段小故事、一個方法、一句鼓勵…"></textarea>
          <div class="btns">
            <button class="btn btn-post" id="btnPublish">📣 發布（馬上上線）</button>
            <button class="btn btn-list" id="btnDraft">存成草稿</button>
            <a class="btn btn-ghost" href="blog.html" target="_blank" style="line-height:1.2;">看最新消息頁 ↗</a>
          </div>
          <div class="msg" id="pMsg"></div>
          <div id="postsWrap" style="margin-top:18px;"></div>
        </div>

        <div class="card">
          <h2><span class="bar"></span>銷售 / 開通紀錄</h2>
          <div class="card-note">每一筆「誰、開通了哪門課、多少錢、來源、時間」。可搜尋、可匯出 CSV（記帳、對帳用）。</div>
          <div class="row-top">
            <input id="salesSearch" type="text" placeholder="搜尋 email／暱稱／課程…" style="max-width:340px;">
            <div class="tools">
              <button class="btn btn-csv" id="btnCsv">⬇ 匯出 CSV</button>
              <button class="btn btn-ghost" id="btnReloadAll">重新整理</button>
            </div>
          </div>
          <div id="salesWrap"><div class="state"><div class="spin"></div>載入紀錄中…</div></div>
        </div>

        <div class="card">
          <h2><span class="bar"></span>各課程業績</h2>
          <div id="byCourseWrap"></div>
        </div>

        <div class="card">
          <h2><span class="bar"></span>會員總覽</h2>
          <div class="card-note">依註冊時間排序。點「選這位」可直接到下方幫他開通／取消課程。</div>
          <input id="memberSearch" type="text" placeholder="搜尋 email 或暱稱…" style="max-width:340px;margin-bottom:6px;">
          <div id="membersWrap"><div class="state"><div class="spin"></div>載入會員中…</div></div>
        </div>

        <div class="card">
          <h2><span class="bar"></span>開通 / 取消課程</h2>
          <div class="card-note">用會員的 email 開通。對方需先在網站註冊過一次（Email、Google 或 LINE 登入都算）。</div>
          <div class="selbar" id="selbar"></div>
          <label>會員 Email</label>
          <input id="gEmail" type="email" placeholder="對方註冊的 email，例如 someone@gmail.com">
          <label>課程</label>
          <select id="gCourse">${opts}</select>
          <div class="btns">
            <button class="btn btn-grant" id="btnGrant">✓ 開通課程</button>
            <button class="btn btn-list" id="btnList">查詢此會員已開通</button>
            <button class="btn btn-revoke" id="btnRevoke">取消開通</button>
          </div>
          <div class="msg" id="msg"></div>
          <div id="listWrap"></div>
        </div>
      </div>`;

    // ── state ──
    let allSales=[], allMembers=[];

    // ── source label ──
    const srcLabel=(s)=>{
      const k=(s||'manual').toLowerCase();
      if(k==='free') return '<span class="src free">免費</span>';
      if(k==='manual') return '<span class="src manual">現金／手動</span>';
      if(['ecpay','stripe','card','unipay','newebpay'].includes(k)) return '<span class="src card">刷卡</span>';
      return '<span class="src">'+esc(k)+'</span>';
    };
    const isCard=(s)=> ['ecpay','stripe','card','unipay','newebpay'].includes((s||'').toLowerCase());

    // ── stat tiles ──
    const renderTiles=()=>{
      const paid = allSales.filter(r=>Number(r.price)>0);
      const freeCnt = allSales.length - paid.length;
      const total = paid.reduce((s,r)=>s+Number(r.price||0),0);
      const cash  = paid.filter(r=>(r.source||'manual')==='manual').reduce((s,r)=>s+Number(r.price||0),0);
      const card  = paid.filter(r=>isCard(r.source)).reduce((s,r)=>s+Number(r.price||0),0);
      $('tiles').innerHTML=`
        <div class="tile"><div class="k">會員總數</div><div class="v">${allMembers.length}</div><div class="x">已註冊帳號</div></div>
        <div class="tile"><div class="k">付費課開通數</div><div class="v">${paid.length}</div><div class="x">免費開通 ${freeCnt} 筆</div></div>
        <div class="tile money"><div class="k">累計銷售金額</div><div class="v">${nt(total)}</div><div class="x">現金 ${nt(cash)}　刷卡 ${nt(card)}</div></div>
        <div class="tile"><div class="k">刷卡實收</div><div class="v"><small>${nt(card)}</small></div><div class="x">金流串接後自動累計</div></div>`;
    };

    // ── sales ledger ──
    const renderSales=(list)=>{
      const box=$('salesWrap');
      if(!list.length){ box.innerHTML='<div class="empty">目前沒有符合的紀錄。</div>'; return; }
      box.innerHTML=`<div class="tbl-scroll"><table>
        <thead><tr><th>時間</th><th>會員</th><th>課程</th><th>金額</th><th>來源</th><th></th></tr></thead>
        <tbody>${list.map(r=>`<tr>
          <td class="seq">${esc(fmtDate(r.granted_at))}</td>
          <td class="email-cell">${esc(r.email||'—')}${r.display_name?'<div style="font-size:12px;color:var(--ink-soft);font-weight:400;">'+esc(r.display_name)+'</div>':''}</td>
          <td>${esc(r.course_name||r.course_id)}</td>
          <td class="money-cell ${Number(r.price)>0?'':'free'}">${Number(r.price)>0?nt(r.price):'免費'}</td>
          <td>${srcLabel(r.source)}</td>
          <td><button class="pick" data-email="${esc(r.email||'')}">選這位</button></td>
        </tr>`).join('')}</tbody></table></div>`;
      box.querySelectorAll('.pick').forEach(b=>b.onclick=()=>selectMember(b.getAttribute('data-email')));
    };

    // ── by course ──
    const renderByCourse=()=>{
      const map={};
      allSales.forEach(r=>{
        const k=r.course_id||'?';
        if(!map[k]) map[k]={name:r.course_name||k, count:0, rev:0, price:Number(r.price)||0};
        map[k].count++; map[k].rev += Number(r.price)||0;
      });
      const rows=Object.values(map).sort((a,b)=>b.rev-a.rev);
      if(!rows.length){ $('byCourseWrap').innerHTML='<div class="empty">尚無開通紀錄。</div>'; return; }
      $('byCourseWrap').innerHTML=`<div class="tbl-scroll" style="max-height:none;"><table style="min-width:420px;">
        <thead><tr><th>課程</th><th>開通數</th><th>累計金額</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td>${esc(r.name)}</td><td class="cc">${r.count}</td><td class="money-cell ${r.rev>0?'':'free'}">${r.rev>0?nt(r.rev):'免費'}</td></tr>`).join('')}</tbody></table></div>`;
    };

    // ── members ──
    const isLineAccount=(em)=> /^line_/i.test(em||'') || /@line\./i.test(em||'');
    const loginMethod=(m)=>{
      if(isLineAccount(m.email)) return '<span class="prov line">LINE</span>';
      const p=m.provider; if(!p) return '<span class="prov">—</span>';
      return p.split(',').map(x=>{const k=x.trim().toLowerCase();const l=k==='email'?'Email':(k==='google'?'Google':(k==='line'?'LINE':k));return `<span class="prov ${k}">${esc(l)}</span>`;}).join('');
    };
    const showEmail=(m)=> isLineAccount(m.email) ? `LINE 會員<span style="color:var(--ink-soft);font-weight:400;">（${esc(m.display_name||'未命名')}）</span>` : esc(m.email||'（無 email）');
    const renderMembers=(list)=>{
      const box=$('membersWrap');
      if(!list.length){ box.innerHTML='<div class="empty">沒有符合的會員。</div>'; return; }
      box.innerHTML=`<div class="tbl-scroll"><table>
        <thead><tr><th>#</th><th>Email</th><th>登入方式</th><th>暱稱</th><th>註冊時間</th><th>已開通</th><th></th></tr></thead>
        <tbody>${list.map(m=>`<tr>
          <td class="seq">${m.seq}</td>
          <td class="email-cell">${showEmail(m)}</td>
          <td>${loginMethod(m)}</td>
          <td>${esc(m.display_name||'')}</td>
          <td class="seq">${esc(fmtDate(m.created_at))}</td>
          <td class="cc ${(m.course_count||0)===0?'zero':''}">${m.course_count||0}</td>
          <td><button class="pick" data-email="${esc(m.email||'')}">選這位</button></td>
        </tr>`).join('')}</tbody></table></div>`;
      box.querySelectorAll('.pick').forEach(b=>b.onclick=()=>selectMember(b.getAttribute('data-email')));
    };

    // ── loaders ──
    const loadAll=async ()=>{
      $('salesWrap').innerHTML='<div class="state"><div class="spin"></div>載入紀錄中…</div>';
      $('membersWrap').innerHTML='<div class="state"><div class="spin"></div>載入會員中…</div>';
      const [salesRes, memRes] = await Promise.all([
        supabase.rpc('admin_sales_report'),
        supabase.rpc('admin_list_members')
      ]);
      if(salesRes.error){ $('salesWrap').innerHTML='<div class="empty" style="color:var(--err);">讀取紀錄失敗：'+esc(salesRes.error.message)+'</div>'; }
      else { allSales = salesRes.data||[]; }
      if(memRes.error){ $('membersWrap').innerHTML='<div class="empty" style="color:var(--err);">讀取會員失敗：'+esc(memRes.error.message)+'</div>'; }
      else { allMembers = memRes.data||[]; }
      renderTiles(); renderSales(allSales); renderByCourse(); renderMembers(allMembers);
    };
    $('btnReloadAll').onclick=loadAll;

    // ── search filters ──
    $('salesSearch').oninput=(e)=>{
      const q=e.target.value.trim().toLowerCase();
      if(!q){ renderSales(allSales); return; }
      renderSales(allSales.filter(r=>((r.email||'')+(r.display_name||'')+(r.course_name||'')+(r.course_id||'')).toLowerCase().includes(q)));
    };
    $('memberSearch').oninput=(e)=>{
      const q=e.target.value.trim().toLowerCase();
      if(!q){ renderMembers(allMembers); return; }
      renderMembers(allMembers.filter(m=>((m.email||'')+(m.display_name||'')).toLowerCase().includes(q)));
    };

    // ── CSV export ──
    $('btnCsv').onclick=()=>{
      const head=['時間','Email','暱稱','課程','課程代號','金額','來源'];
      const esc2=(v)=>{ const s=String(v==null?'':v); return /[",\n]/.test(s)?('"'+s.replace(/"/g,'""')+'"'):s; };
      const lines=[head.join(',')].concat(allSales.map(r=>[
        fmtDate(r.granted_at), r.email||'', r.display_name||'', r.course_name||'', r.course_id||'',
        Number(r.price)||0, r.source||'manual'
      ].map(esc2).join(',')));
      const csv='﻿'+lines.join('\r\n'); // BOM for Excel 中文
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download='強腦力-銷售紀錄.csv';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 500);
    };

    // ── select member into grant form ──
    const selectMember=(em)=>{
      $('gEmail').value=em;
      const sb=$('selbar'); sb.className='selbar show'; sb.innerHTML=`已選擇會員：<b>${esc(em)}</b>　可在下方開通 / 取消 / 查詢`;
      $('gEmail').scrollIntoView({behavior:'smooth',block:'center'});
    };

    // ── grant / revoke / query ──
    const msg=(t,type)=>{ const m=$('msg'); m.className='msg show '+type; m.textContent=t; };
    const emailVal=()=>$('gEmail').value.trim();
    const courseLabel=()=>{ const s=$('gCourse'); return s.options[s.selectedIndex] ? s.options[s.selectedIndex].text : $('gCourse').value; };

    $('btnGrant').onclick=async ()=>{
      if(!emailVal()){ msg('請先輸入或選擇會員 Email。','error'); return; }
      $('btnGrant').disabled=true; msg('開通中…','ok');
      const { data, error } = await supabase.rpc('admin_grant_course',{ target_email:emailVal(), p_course_id:$('gCourse').value });
      $('btnGrant').disabled=false;
      if(error){ msg('❌ '+error.message,'error'); return; }
      msg(data||'完成','ok'); loadAll();
    };
    let revokeArmed=false, revokeTimer=null;
    $('btnRevoke').onclick=async ()=>{
      if(!emailVal()){ msg('請先輸入或選擇會員 Email。','error'); return; }
      if(!revokeArmed){
        revokeArmed=true; $('btnRevoke').textContent='⚠ 再按一次確認取消';
        msg(`即將取消 ${emailVal()} 的《${courseLabel()}》，再按一次「取消開通」確認。`,'error');
        revokeTimer=setTimeout(()=>{ revokeArmed=false; $('btnRevoke').textContent='取消開通'; },4000);
        return;
      }
      clearTimeout(revokeTimer); revokeArmed=false; $('btnRevoke').textContent='取消開通';
      $('btnRevoke').disabled=true; msg('處理中…','ok');
      const { data, error } = await supabase.rpc('admin_revoke_course',{ target_email:emailVal(), p_course_id:$('gCourse').value });
      $('btnRevoke').disabled=false;
      if(error){ msg('❌ '+error.message,'error'); return; }
      msg(data||'已取消','ok'); loadAll();
    };
    $('btnList').onclick=async ()=>{
      if(!emailVal()){ msg('請先輸入或選擇會員 Email。','error'); return; }
      msg('查詢中…','ok');
      const { data, error } = await supabase.rpc('admin_list_enrollments',{ target_email:emailVal() });
      if(error){ msg('❌ '+error.message,'error'); $('listWrap').innerHTML=''; return; }
      msg('查詢完成','ok');
      if(!data || !data.length){ $('listWrap').innerHTML='<div class="card-note" style="margin:14px 0 0 0;">這位會員目前沒有已開通的課程。</div>'; return; }
      $('listWrap').innerHTML='<div class="tbl-scroll" style="margin-top:14px;max-height:none;"><table><thead><tr><th>課程</th><th>代號</th><th>來源</th><th>開通時間</th></tr></thead><tbody>'+
        data.map(r=>`<tr><td>${esc(r.course_name)}</td><td>${esc(r.course_id)}</td><td>${srcLabel(r.source)}</td><td class="seq">${esc(fmtDate(r.granted_at))}</td></tr>`).join('')+'</tbody></table></div>';
    };

    // ── 發文 CMS ──
    const pMsg=(t,type)=>{ const m=$('pMsg'); m.className='msg show '+type; m.textContent=t; };
    const doPublish=async (status)=>{
      const title=$('pTitle').value.trim(), body=$('pBody').value.trim();
      if(!title || !body){ pMsg('請填標題和內容。','error'); return; }
      $('btnPublish').disabled=true; $('btnDraft').disabled=true; pMsg(status==='draft'?'儲存草稿中…':'發布中…','ok');
      const { error } = await supabase.rpc('admin_create_post',{
        p_title:title, p_body:body,
        p_excerpt:null, p_cover:$('pCover').value.trim()||null,
        p_tag:$('pTag').value.trim()||null, p_status:status
      });
      $('btnPublish').disabled=false; $('btnDraft').disabled=false;
      if(error){ pMsg('❌ '+error.message,'error'); return; }
      pMsg(status==='draft'?'已存成草稿。':'✓ 已發布！已經出現在「最新消息」頁了。','ok');
      $('pTitle').value=''; $('pBody').value=''; $('pTag').value=''; $('pCover').value='';
      loadPosts();
    };
    $('btnPublish').onclick=()=>doPublish('published');
    $('btnDraft').onclick=()=>doPublish('draft');

    const loadPosts=async ()=>{
      const { data, error } = await supabase.rpc('admin_list_posts');
      const box=$('postsWrap');
      if(error){ box.innerHTML='<div class="card-note" style="margin:0;color:var(--err);">讀取貼文失敗：'+esc(error.message)+'（若還沒建 posts 表，先在 Supabase 跑 posts_schema.sql）</div>'; return; }
      if(!data || !data.length){ box.innerHTML='<div class="card-note" style="margin:0;">還沒有任何貼文。發一篇試試！</div>'; return; }
      box.innerHTML='<div class="tbl-scroll" style="max-height:320px;"><table style="min-width:520px;"><thead><tr><th>時間</th><th>標題</th><th>標籤</th><th>狀態</th><th></th></tr></thead><tbody>'+
        data.map(r=>`<tr>
          <td class="seq">${esc(fmtDate(r.published_at))}</td>
          <td>${esc(r.title)}</td>
          <td>${r.tag?esc(r.tag):'—'}</td>
          <td><span class="post-st ${r.status}">${r.status==='published'?'已發布':'草稿'}</span></td>
          <td>${r.status==='published'
              ? `<button class="mini draft" data-id="${r.id}" data-act="draft">收回</button>`
              : `<button class="mini pub" data-id="${r.id}" data-act="published">發布</button>`}
            <button class="mini del" data-id="${r.id}" data-act="deleted">刪除</button></td>
        </tr>`).join('')+'</tbody></table></div>';
      box.querySelectorAll('.mini').forEach(b=>b.onclick=async ()=>{
        const act=b.getAttribute('data-act'), id=Number(b.getAttribute('data-id'));
        if(act==='deleted' && b.getAttribute('data-armed')!=='1'){ b.setAttribute('data-armed','1'); b.textContent='確認刪除'; setTimeout(()=>{ if(b.isConnected){b.setAttribute('data-armed','0'); b.textContent='刪除';} },3500); return; }
        b.disabled=true;
        const { error } = await supabase.rpc('admin_set_post_status',{ p_id:id, p_status:act });
        if(error){ pMsg('❌ '+error.message,'error'); b.disabled=false; return; }
        loadPosts();
      });
    };
    loadPosts();

    loadAll();
  })();
</script>
</body>
</html>
