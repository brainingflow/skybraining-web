<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員中心・我的課程 — 強腦力 SkyBraining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#151731;--paper:#FAF9F5;--paper-2:#F2F0E8;--ink:#1B1D33;--ink-soft:#5b5f7a;
    --amber:#FFB020;--orange:#FF8A3D;--teal:#16B0A8;--teal-deep:#0d8a83;
    --line-brand:#06C755;--hair:rgba(21,23,49,.1);
    --sans:"Noto Sans TC",sans-serif;--round:"Baloo 2","Noto Sans TC",sans-serif;
    --shadow-sm:0 6px 20px rgba(21,23,49,.06);--shadow-md:0 18px 44px rgba(21,23,49,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;min-height:100vh;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3,.round{font-family:var(--round);}
  .wrap{max-width:1000px;margin:0 auto;padding:0 clamp(20px,5vw,40px);}
  nav{background:rgba(250,249,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:20;}
  .nav-in{display:flex;align-items:center;justify-content:space-between;padding:13px clamp(20px,5vw,40px);max-width:1100px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--round);font-weight:800;font-size:20px;color:var(--indigo);}
  .logo-mark{width:36px;height:36px;border-radius:10px;background:var(--indigo);display:grid;place-items:center;box-shadow:var(--shadow-sm);}
  .logo-mark svg{width:22px;height:22px;}
  .nav-right{display:flex;align-items:center;gap:16px;font-size:14px;}
  .nav-right .who{color:var(--ink-soft);}
  .logout{font-family:var(--round);font-weight:700;font-size:13.5px;color:var(--indigo);border:1.5px solid var(--hair);background:none;padding:8px 15px;border-radius:30px;cursor:pointer;transition:border-color .2s;}
  .logout:hover{border-color:var(--indigo);}
  .head{padding:48px 0 10px;}
  .hi{font-family:var(--round);font-weight:800;font-size:clamp(26px,4vw,38px);color:var(--indigo);}
  .sub{color:var(--ink-soft);margin-top:6px;}
  .section-t{font-family:var(--round);font-weight:800;font-size:20px;color:var(--indigo);margin:40px 0 18px;display:flex;align-items:center;gap:10px;}
  .section-t .bar{width:6px;height:22px;border-radius:4px;background:linear-gradient(var(--amber),var(--orange));}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;padding-bottom:60px;}
  @media(max-width:720px){.grid{grid-template-columns:1fr;}}
  .course{background:#fff;border:1px solid var(--hair);border-radius:22px;overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;}
  .course:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
  .course-top{padding:24px 26px;color:#fff;position:relative;overflow:hidden;}
  .course-top.amber{background:linear-gradient(135deg,#FFB020,#FF8A3D);}
  .course-top.teal{background:linear-gradient(135deg,#16B0A8,#0d8a83);}
  .course-top::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.15);}
  .course-lv{font-family:var(--round);font-weight:700;font-size:12px;background:rgba(255,255,255,.22);padding:4px 11px;border-radius:20px;position:relative;z-index:1;}
  .course-name{font-family:var(--round);font-weight:800;font-size:23px;margin-top:12px;position:relative;z-index:1;}
  .course-sub{font-size:13px;opacity:.9;position:relative;z-index:1;}
  .course-body{padding:22px 26px;display:flex;flex-direction:column;gap:14px;flex:1;}
  .status{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13.5px;}
  .status.owned{color:var(--teal-deep);}
  .status.locked{color:var(--ink-soft);}
  .status .dot{width:8px;height:8px;border-radius:50%;}
  .status.owned .dot{background:var(--teal);}
  .status.locked .dot{background:#c9ccd8;}
  .course-actions{margin-top:auto;}
  .btn{font-family:var(--round);font-weight:700;font-size:15px;padding:11px 22px;border-radius:30px;display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:none;transition:transform .2s,filter .2s;}
  .btn:hover{transform:translateY(-2px);}
  .btn-watch{color:#fff;}
  .btn-watch.amber{background:linear-gradient(135deg,#FFB020,#FF8A3D);}
  .btn-watch.teal{background:linear-gradient(135deg,#16B0A8,#0d8a83);}
  .btn-buy{color:var(--indigo);background:var(--paper-2);}
  .btn-buy:hover{background:#e8e5da;}
  .state{padding:70px 0;text-align:center;color:var(--ink-soft);}
  .state .spin{width:34px;height:34px;border:3px solid var(--hair);border-top-color:var(--orange);border-radius:50%;margin:0 auto 16px;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .foot-note{color:var(--ink-soft);font-size:13px;padding:0 0 50px;}
  .links-card{background:#fff;border:1px solid var(--hair);border-radius:22px;box-shadow:var(--shadow-sm);padding:20px 26px;margin-bottom:44px;}
  .links-lead{font-size:13.5px;color:var(--ink-soft);margin-bottom:6px;}
  .link-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-top:1px solid var(--hair);}
  .link-row:first-of-type{border-top:none;}
  .link-info{display:flex;align-items:center;gap:11px;}
  .link-name{font-weight:700;font-family:var(--round);color:var(--indigo);font-size:15px;}
  .link-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .link-badge.on{color:var(--teal-deep);background:rgba(22,176,168,.12);}
  .link-badge.off{color:var(--ink-soft);background:var(--paper-2);}
  .link-btn{font-family:var(--round);font-weight:700;font-size:14px;color:#fff;background:linear-gradient(135deg,#FFB020,#FF8A3D);border:none;padding:9px 18px;border-radius:24px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
  .link-btn:hover{filter:brightness(1.03);}
  .link-btn.line{background:var(--line-brand);}
  .link-btn:disabled{opacity:.6;cursor:not-allowed;}
  .link-soon{font-size:12.5px;color:var(--ink-soft);}
  .link-msg{font-size:13px;padding-top:10px;display:none;}
  .link-msg.show{display:block;}
  .link-msg.err{color:#d64545;}
  .link-msg.ok{color:var(--teal-deep);}
</style>
</head>
<body>
<nav>
  <div class="nav-in">
    <a class="brand" href="index.html">
      <span class="logo-mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.2c-2.6 0-4.6 1.7-5 4C5 6.6 3.6 8.2 3.6 10.2c0 1.2.5 2.2 1.3 2.9-.2.5-.3 1-.3 1.6 0 2.1 1.7 3.7 3.9 3.7.5 1.3 1.8 2.2 3.5 2.2s3-.9 3.5-2.2c2.2 0 3.9-1.6 3.9-3.7 0-.6-.1-1.1-.3-1.6.8-.7 1.3-1.7 1.3-2.9 0-2-1.4-3.6-3.4-4-.4-2.3-2.4-4-5-4z" fill="#FFB020"/></svg></span>
      強腦力
    </a>
    <div class="nav-right">
      <a href="index.html" style="color:var(--ink-soft);font-weight:500;">← 回首頁</a>
      <a href="account.html" style="color:var(--ink-soft);font-weight:500;">修改密碼</a>
      <span id="adminLink"></span>
      <span class="who" id="who"></span>
      <button class="logout" id="logout">登出</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="head">
    <div class="hi" id="hi">會員中心</div>
    <div class="sub">管理你的帳號、觀看已購買的課程。</div>
  </div>

  <div id="content">
    <div class="state"><div class="spin"></div>載入中…</div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const SUPABASE_URL  = 'https://gfuqizxzihgydzyqywun.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_4OkL-CDoS542x8odCTWbtQ_DzKR7dMv';
  const LOGIN_PAGE = 'login.html';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
  const $ = (id)=>document.getElementById(id);

  $('logout').onclick = async ()=>{ await supabase.auth.signOut(); location.href = LOGIN_PAGE; };

  (async ()=>{
    const { data:{ session } } = await supabase.auth.getSession();
    if(!session){ location.href = LOGIN_PAGE; return; }
    const user = session.user;

    // 讀 profile（家長暱稱）
    let name = user.email;
    const { data:prof } = await supabase.from('profiles').select('display_name,child_nickname').eq('id', user.id).maybeSingle();
    if(prof && prof.display_name) name = prof.display_name;
    $('who').textContent = user.email;
    if((user.email||'').toLowerCase()==='brainingflow@gmail.com'){
      document.getElementById('adminLink').innerHTML='<a href="admin.html" style="color:var(--orange);font-weight:700;">後台管理</a>';
    }
    $('hi').textContent = `嗨，${name}！`;

    // 讀所有課程 + 本人的購買紀錄
    const [{ data:courses, error:cErr }, { data:enroll }] = await Promise.all([
      supabase.from('courses').select('*').eq('is_published',true).order('sort_order'),
      supabase.from('enrollments').select('course_id')
    ]);
    if(cErr){ $('content').innerHTML = errBox('讀取課程時發生問題：'+cErr.message); return; }
    const owned = new Set((enroll||[]).map(e=>e.course_id));

    const ownedCourses = (courses||[]).filter(c=>owned.has(c.id));
    const otherCourses = (courses||[]).filter(c=>!owned.has(c.id));

    let html = '';
    html += `<div class="section-t"><span class="bar"></span>我的課程（${ownedCourses.length}）</div>`;
    if(ownedCourses.length){
      html += '<div class="grid">' + ownedCourses.map(c=>card(c,true)).join('') + '</div>';
    }else{
      html += `<div class="foot-note">你目前還沒有已開通的課程。下方是可選購的課程，或先加 LINE 免費試看。</div>`;
    }
    if(otherCourses.length){
      html += `<div class="section-t"><span class="bar"></span>探索更多課程</div>`;
      html += '<div class="grid">' + otherCourses.map(c=>card(c,false)).join('') + '</div>';
    }
    html += `<div id="acctLinks"></div>`;
    $('content').innerHTML = html;
    renderAccountLinks();
  })();

  // ── 帳號連結：讓 Email／Google／LINE 綁在同一個帳號 ──
  // LINE 登入 edge function 上線後，把「帶當前登入 token 的綁定網址」填進這裡即可啟用 LINE 綁定按鈕
  const LINE_LINK_URL = '';
  async function renderAccountLinks(){
    const box = $('acctLinks');
    if(!box) return;
    let ids = [];
    try{
      const { data } = await supabase.auth.getUserIdentities();
      ids = (data && data.identities) ? data.identities : [];
    }catch(e){ /* 舊 session 可能不支援，靜默略過 */ }
    const has = (p)=> ids.some(i=>i.provider===p);
    const row = (name, connected, actionHtml)=>`
      <div class="link-row">
        <div class="link-info"><span class="link-name">${name}</span>
          <span class="link-badge ${connected?'on':'off'}">${connected?'已連結':'未連結'}</span></div>
        <div>${actionHtml}</div>
      </div>`;
    let rows = '';
    rows += row('Email ／ 密碼登入', has('email'),
      has('email') ? '' : `<a class="link-btn" href="account.html">設定密碼 →</a>`);
    rows += row('Google 登入', has('google'),
      has('google') ? '' : `<button class="link-btn" id="linkGoogle">連結 Google →</button>`);
    rows += row('LINE 登入', has('line'),
      has('line') ? '' : (LINE_LINK_URL
        ? `<a class="link-btn line" href="${LINE_LINK_URL}">連結 LINE →</a>`
        : `<span class="link-soon">LINE 登入設定完成後開放</span>`));
    box.innerHTML = `
      <div class="section-t"><span class="bar"></span>帳號與登入方式</div>
      <div class="links-card">
        <p class="links-lead">同一個人可以綁定多種登入方式。綁定之後，不管用 Email、Google 還是 LINE 登入，看到的都是同一個帳號、同一批課程。</p>
        ${rows}
        <div class="link-msg" id="linkMsg"></div>
      </div>`;
    const lmsg = (t,type)=>{ const m=$('linkMsg'); if(!m) return; m.className='link-msg show '+type; m.textContent=t; };
    const g = $('linkGoogle');
    if(g) g.onclick = async ()=>{
      g.disabled = true; g.textContent = '前往 Google…';
      const { error } = await supabase.auth.linkIdentity({ provider:'google' });
      if(error){ g.disabled=false; g.textContent='連結 Google →'; lmsg('連結失敗：'+error.message,'err'); }
    };
  }

  function card(c, owned){
    const color = c.accent==='teal' ? 'teal' : 'amber';
    const intro = c.id==='super-memory' ? '課程介紹-過目不忘' : (c.id==='super-thinking' ? '課程介紹-10倍聯想力' : '');
    const introHref = c.id==='super-memory' ? 'course-memory.html' : (c.id==='super-thinking' ? 'course-thinking.html' : 'index.html#courses');
    const isFree = (c.price||0)===0;
    const action = owned
      ? `<a class="btn btn-watch ${color}" href="watch.html?course=${encodeURIComponent(c.id)}">▶ 開始觀看</a>`
      : (isFree
          ? `<a class="btn btn-watch teal" href="watch.html?course=${encodeURIComponent(c.id)}">免費開通・立即觀看 →</a>`
          : `<a class="btn btn-buy" href="${introHref}">了解課程 · NT$${c.price.toLocaleString()} →</a>`);
    const status = owned
      ? `<span class="status owned"><span class="dot"></span>已開通・永久觀看</span>`
      : (isFree
          ? `<span class="status owned"><span class="dot"></span>免費・登入就能看</span>`
          : `<span class="status locked"><span class="dot"></span>尚未購買</span>`);
    return `<div class="course">
      <div class="course-top ${color}">
        <span class="course-lv">Level ${c.level}</span>
        <div class="course-name">${c.name}</div>
        <div class="course-sub">${c.subtitle||''}</div>
      </div>
      <div class="course-body">
        ${status}
        <div style="font-size:14px;color:var(--ink-soft);">${c.description||''}</div>
        <div class="course-actions">${action}</div>
      </div>
    </div>`;
  }
  function errBox(t){ return `<div class="foot-note" style="color:#d64545;">${t}</div>`; }
</script>
</body>
</html>
