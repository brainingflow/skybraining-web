<script>
(function(){
  var msgs=[
    '嗨！我是<b>燈寶</b> 💡 要不要先上一堂 <a href="login.html">免費課</a>？',
    '3 分鐘測出孩子的學習力！<a href="quiz.html">馬上免費檢測</a> 📝',

    '今天也要動動腦，你超棒的！💪',
    '有問題想問？點右下角 <b>加 LINE</b> 找我們 💬'
  ];
  var i=-1,box=document.getElementById('naobao'),b=document.getElementById('nb-bubble'),btn=document.getElementById('nb-body'),t;
  var hovering=false;
  btn.addEventListener('mouseenter',function(){hovering=true;});
  btn.addEventListener('mouseleave',function(){hovering=false;});
  function say(){ i=(i+1)%msgs.length; b.innerHTML='<span class="nb-name">燈寶</span>'+msgs[i]; b.classList.add('show'); clearTimeout(t); t=setTimeout(function(){b.classList.remove('show');},7000); }
  btn.addEventListener('click',say);
  // ── 位置 & 飛行 ──
  var W=function(){return window.innerWidth;}, H=function(){return window.innerHeight;};
  var curX=20, curY=H()-110;
  function place(x,y){ curX=x; curY=y; box.style.left=x+'px'; box.style.top=y+'px'; b.classList.toggle('side-left', x > W()*0.55); }
  box.style.transition='none'; place(20, H()-110);
  setTimeout(function(){ box.style.transition=''; }, 60);
  function fly(){
    if(hovering || b.classList.contains('show')) return;   // 說話或被摸摸時不飛
    if(document.hidden) return;
    var m=16, bw=90, bh=110;
    var x = m + Math.random()*Math.max(1, W()-bw-m*2);
    var y = 150 + Math.random()*Math.max(1, H()-bh-150-m);
    box.classList.toggle('face-left', x < curX);
    box.classList.add('flying');
    place(x,y);
    setTimeout(function(){ box.classList.remove('flying'); box.classList.remove('face-left'); }, 3500);
  }
  setInterval(fly, 8000);
  window.addEventListener('resize', function(){
    if(curX > W()-100 || curY > H()-90) { box.style.transition='none'; place(Math.min(curX,W()-100), Math.min(curY,H()-100)); setTimeout(function(){box.style.transition='';},60); }
  });
  // ── 第一次打招呼:等使用者往下捲,或 12 秒後 ──
  var greeted=false;
  function firstGreet(){ if(greeted)return; greeted=true; say(); window.removeEventListener('scroll',onScroll); }
  function onScroll(){ if(window.scrollY>240) firstGreet(); }
  window.addEventListener('scroll',onScroll,{passive:true});
  setTimeout(firstGreet,12000);
})();
</script>
