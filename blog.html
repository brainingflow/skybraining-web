<style>
  :root{
    --indigo:#141631;--indigo-2:#20244a;--paper:#FBFAF6;--paper-2:#F1EFE7;--card:#fff;
    --ink:#191b30;--ink-soft:#5a5e79;
    --amber:#FFB020;--orange:#FF8A3D;--teal:#16B0A8;--teal-deep:#0d8a83;--violet:#7C6CF0;--violet-deep:#4B37D8;
    --hair:rgba(20,22,49,.09);
    --sans:"Noto Sans TC",sans-serif;--round:"Baloo 2","Noto Sans TC",sans-serif;
    --sh-1:0 4px 14px rgba(20,22,49,.05);--sh-2:0 12px 30px rgba(20,22,49,.09);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3,.round{font-family:var(--round);}
  .wrap{max-width:820px;margin:0 auto;padding:0 clamp(20px,5vw,48px);}
  nav{position:sticky;top:0;z-index:20;background:rgba(251,250,246,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);}
  .nav-in{display:flex;align-items:center;justify-content:space-between;padding:13px clamp(20px,5vw,48px);max-width:1160px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--round);font-weight:800;font-size:21px;color:var(--indigo);}
  .wordmark{letter-spacing:1px;font-weight:800;}
  .wm-accent{background:linear-gradient(120deg,#FFB020,#FF8A3D);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-right a{font-weight:500;font-size:14px;color:var(--ink-soft);}
  .nav-right a:hover{color:var(--indigo);}
  .nav-login{font-family:var(--round);font-weight:600;color:var(--indigo);padding:9px 18px;border-radius:30px;border:1.5px solid var(--hair);}
  .nav-login:hover{border-color:var(--indigo);background:var(--indigo);color:#fff;}
  .head{padding:clamp(46px,7vw,74px) 0 6px;text-align:center;}
  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-deep);margin-bottom:16px;}
  .eyebrow::before,.eyebrow::after{content:"";width:22px;height:2px;border-radius:2px;background:linear-gradient(120deg,var(--amber),var(--orange));}
  .head h1{font-weight:800;font-size:clamp(30px,5vw,48px);color:var(--indigo);line-height:1.12;}
  .head p{margin:14px auto 0;color:var(--ink-soft);font-size:16px;max-width:44ch;}
  .feed{padding:clamp(30px,5vw,48px) 0 80px;display:flex;flex-direction:column;gap:22px;}
  .post{background:var(--card);border:1px solid var(--hair);border-radius:22px;box-shadow:var(--sh-1);overflow:hidden;transition:transform .2s,box-shadow .2s;}
  .post:hover{transform:translateY(-3px);box-shadow:var(--sh-2);}
  .post .cover{width:100%;height:auto;display:block;max-height:340px;object-fit:cover;}
  .pbody{padding:26px clamp(22px,4vw,32px) 28px;}
  .pmeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .ptag{font-family:var(--round);font-weight:700;font-size:12px;color:#fff;background:linear-gradient(120deg,var(--violet),var(--violet-deep));padding:3px 12px;border-radius:20px;}
  .pdate{font-size:12.5px;color:var(--ink-soft);}
  .ptitle{font-family:var(--round);font-weight:800;font-size:clamp(20px,3.2vw,26px);color:var(--indigo);line-height:1.25;margin-bottom:12px;}
  .ptext{font-size:15.5px;color:#33374f;white-space:pre-wrap;word-break:break-word;}
  .state{padding:80px 0;text-align:center;color:var(--ink-soft);}
  .state .spin{width:34px;height:34px;border:3px solid var(--hair);border-top-color:var(--orange);border-radius:50%;margin:0 auto 16px;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .backlinks{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:6px 0 0;}
  .backlinks a{font-size:14px;color:var(--teal-deep);font-weight:600;}
  .backlinks a:hover{text-decoration:underline;}
  footer{background:var(--indigo);color:rgba(251,250,246,.7);padding:40px 0;font-size:13.5px;}
  .foot-in{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;max-width:1160px;margin:0 auto;padding:0 clamp(20px,5vw,48px);}
  .foot-in a:hover{color:#fff;}
  .foot-links{display:flex;gap:20px;flex-wrap:wrap;}
</style>

<div class="wrap">

    <p>記憶、專注、學習方法的即時分享，還有強腦力的最新動態。</p>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const SUPABASE_URL  = 'https://gfuqizxzihgydzyqywun.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_4OkL-CDoS542x8odCTWbtQ_DzKR7dMv';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
  const feed = document.getElementById('feed');

  const esc = (s)=> String(s??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const fmtDate = (d)=>{ try{ const t=new Date(d); return `${t.getFullYear()}/${String(t.getMonth()+1).padStart(2,'0')}/${String(t.getDate()).padStart(2,'0')}`; }catch(e){ return ''; } };

  (async ()=>{
    const { data, error } = await supabase.from('posts')
      .select('title,body,cover,tag,published_at')
      .eq('status','published')
      .order('published_at',{ascending:false})
      .limit(60);
    if(error){ feed.innerHTML = `<div class="state" style="color:#d64545;">讀取失敗：${esc(error.message)}<br><span style="font-size:13px;">（若還沒建立 posts 資料表，請先在 Supabase 執行 posts_schema.sql）</span></div>`; return; }
    if(!data || !data.length){ feed.innerHTML = `<div class="state">目前還沒有消息，很快就會有第一篇！<br><span style="font-size:13px;">先去看看 <a href="articles.html" style="color:var(--teal-deep);font-weight:600;">精品文章</a> 吧。</span></div>`; return; }
    feed.innerHTML = data.map(postCard).join('');
  })();

  function postCard(p){
    const cover = p.cover ? `<img class="cover" src="${esc(p.cover)}" alt="${esc(p.title)}" loading="lazy">` : '';
    const tag = p.tag ? `<span class="ptag">${esc(p.tag)}</span>` : '';
    return `<article class="post">
      ${cover}
      <div class="pbody">
        <div class="pmeta">${tag}<span class="pdate">${fmtDate(p.published_at)}</span></div>
        <h2 class="ptitle">${esc(p.title)}</h2>
        <div class="ptext">${esc(p.body)}</div>
      </div>
    </article>`;
  }
</script>
